version: "3"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env.docker-dev
    environment:
      - NODE_ENV=development
      - OLLAMA_HOST=http://host.docker.internal:11434
    depends_on:
      - redis
    networks:
      - numeros-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "cp .env.docker-dev .env && pnpm dev"

  # ollama:
