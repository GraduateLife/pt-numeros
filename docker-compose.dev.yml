  #     - numeros-network
  # Uncomment these lines if you want to enable GPU support
  # deploy:
  #   resources:
  #     reservations:
  #       devices:
  #         - driver: nvidia
  #           count: all
  #           capabilities: [gpu]

  redis:
    image: redis/redis-stack:latest
    restart: unless-stopped
    ports:
      - "6379:6379" # Redis port
      - "8001:8001" # RedisInsight (GUI) port
    volumes:
      - redis_data:/data
    networks:
      - numeros-network

networks:
  numeros-network:
    driver: bridge

volumes:
  # ollama_data:
  #   driver: local
  redis_data:
    driver: local
